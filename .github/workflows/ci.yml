name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      MODEL_N_JOBS: "1"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install project
        run: python -m pip install -e '.[dev]'
      - name: Import smoke test
        run: |
          python -c "import gridmind"
          python -c "import gridmind.api.entrypoint"
          python -c "import gridmind.dashboard.entrypoint"
      - name: Check tracked files for common credential signatures
        run: python scripts/check_tracked_secrets.py
      - name: Ruff formatting
        run: python -m ruff format --check .
      - name: Ruff lint
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy src
      - name: Reset coverage data
        run: |
          python -m coverage erase
          find . -maxdepth 2 -type f -name '.coverage*' -delete
      - name: Tests and coverage
        run: >-
          python -m pytest
          --cov=src/gridmind
          --cov-config=pyproject.toml
          --cov-report=term-missing
          --cov-fail-under=85
